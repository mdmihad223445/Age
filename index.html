<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Age Detector Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #080808;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh;
        }

        .main-card {
            width: 90%; max-width: 420px;
            background: #121212;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        h1 { color: #00b4ff; margin-bottom: 5px; font-size: 1.6rem; }
        .desc { color: #777; font-size: 0.85rem; margin-bottom: 25px; }

        #video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            display: none;
            border: 2px solid #333;
            margin-bottom: 15px;
        }

        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .start-btn {
            background: linear-gradient(135deg, #00b4ff, #0078ff);
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            display: none; /* AI load hone tak hide rahega */
        }

        .start-btn:active { transform: scale(0.95); }

        #result-box {
            margin-top: 20px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 15px;
            display: none;
            border-top: 3px solid #00ff88;
        }

        .age-text { font-size: 1.9rem; font-weight: 800; color: #00ff88; margin-bottom: 5px; }
        .dob-text { color: #aaa; font-size: 0.95rem; line-height: 1.4; }
        
        #loader-text { color: #ffcc00; font-weight: bold; padding: 10px; }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>AI Face Scanner</h1>
        <p class="desc">South Asian Age Prediction Engine</p>

        <div id="loader-text">Initializing AI Engine... Please Wait</div>
        
        <button id="startBtn" class="start-btn">Start Scanning</button>

        <div id="video-container">
            <video id="video" autoplay muted playsinline></video>
        </div>

        <div id="result-box">
            <div id="age-range" class="age-text">--</div>
            <div id="dob-info" class="dob-text">--</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('startBtn');
        const loaderText = document.getElementById('loader-text');
        const videoContainer = document.getElementById('video-container');
        const resultBox = document.getElementById('result-box');
        const ageRangeDisplay = document.getElementById('age-range');
        const dobInfoDisplay = document.getElementById('dob-info');

        // Sabse stable Model URL (Direct from GitHub repo)
        const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';

        async function setupAI() {
            try {
                // Models Loading
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL);
                
                // Jab load ho jaye tab button dikhao
                loaderText.style.display = 'none';
                startBtn.style.display = 'inline-block';
            } catch (err) {
                loaderText.innerText = "Error: Models failed to load. Refresh or check net.";
                console.error(err);
            }
        }

        startBtn.onclick = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
                
                startBtn.style.display = 'none';
                videoContainer.style.display = 'block';
                
                startDetection();
            } catch (err) {
                alert("Camera permission denied!");
            }
        };

        function startDetection() {
            setInterval(async () => {
                const result = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withAgeAndGender();
                
                if (result) {
                    resultBox.style.display = 'block';
                    const age = Math.round(result.age);
                    
                    // Tera requested Age Range Logic
                    let start, end;
                    if (age % 2 === 0) {
                        start = age - 1; end = age;
                    } else {
                        start = age; end = age + 1;
                    }

                    ageRangeDisplay.innerText = `Your age: ${start}-${end}`;
                    
                    const birthYear = 2026 - age;
                    dobInfoDisplay.innerHTML = `Possibly ${age} year old<br>Birth: ${birthYear}/January/1`;
                }
            }, 1000);
        }

        setupAI();
    </script>
</body>
</html>
