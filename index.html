<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL CORE v10.0 | DARK SOUL GOD-SCANNER</title>
    
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* [0-10] THEME & CORE UI */
        :root {
            --neon-green: #00ff88;
            --cyber-cyan: #00f2ff;
            --warning-red: #ff003c;
            --matrix-dark: #020202;
            --glass: rgba(10, 10, 10, 0.85);
            --font-hacker: 'Courier New', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background: var(--matrix-dark);
            color: var(--neon-green);
            font-family: var(--font-hacker);
            overflow: hidden;
            height: 100vh;
            perspective: 1000px;
        }

        /* Custom Cursor */
        #custom-cursor {
            width: 20px; height: 20px; border: 1px solid var(--cyber-cyan);
            position: fixed; pointer-events: none; z-index: 9999;
            transition: transform 0.1s; border-radius: 50%;
        }

        /* [8] Matrix Digital Rain Canvas */
        #matrix-bg {
            position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15;
        }

        /* [2] Scanline & CRT Effect */
        .scanlines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 1000;
        }

        /* [30] Fingerprint Login Mask */
        #login-gate {
            position: fixed; inset: 0; background: #000; z-index: 5000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .finger-print-icon {
            width: 120px; height: 120px; border: 2px solid var(--neon-green);
            border-radius: 50%; margin-bottom: 20px; display: flex;
            align-items: center; justify-content: center; font-size: 3rem;
            box-shadow: 0 0 20px var(--neon-green); animation: scan-line 2s infinite;
        }

        @keyframes scan-line {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; box-shadow: 0 0 40px var(--neon-green); }
        }

        /* [40-47] Top HUD */
        .hud-top {
            position: absolute; top: 0; width: 100%; padding: 10px 20px;
            display: flex; justify-content: space-between; font-size: 0.75rem;
            background: rgba(0,0,0,0.8); border-bottom: 1px solid #333; z-index: 100;
        }

        .hud-item { color: var(--cyber-cyan); text-transform: uppercase; }

        /* [4, 5, 7, 35] Scanner UI */
        .scanner-wrap {
            position: relative; width: 400px; height: 400px;
            margin-top: 80px; border: 1px solid #222;
            background: #000; overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.2);
        }

        #camera-feed {
            width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);
        }

        #overlay-canvas {
            position: absolute; top: 0; left: 0; z-index: 5;
        }

        .reticle {
            position: absolute; width: 50px; height: 50px;
            border: 2px solid var(--neon-green); z-index: 10;
        }
        .top-left { top: 0; left: 0; border-right: 0; border-bottom: 0; }
        .top-right { top: 0; right: 0; border-left: 0; border-bottom: 0; }
        .bottom-left { bottom: 0; left: 0; border-right: 0; border-top: 0; }
        .bottom-right { bottom: 0; right: 0; border-left: 0; border-top: 0; }

        /* [3] Heartbeat Waveform */
        .pulse-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; height: 40px; z-index: 15;
        }

        /* [11-20] Report UI */
        #report-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 2000; padding: 40px; overflow-y: auto;
        }

        .report-header {
            text-align: center; border-bottom: 2px solid var(--neon-green);
            padding-bottom: 20px; margin-bottom: 30px;
        }

        .report-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .stat-card {
            background: #111; border: 1px solid #333; padding: 15px;
            border-left: 4px solid var(--cyber-cyan);
        }

        .stat-card label { display: block; font-size: 0.6rem; color: #888; margin-bottom: 5px; }
        .stat-card span { font-size: 1.1rem; font-weight: bold; color: #fff; }

        /* [50] SSC Countdown */
        .ssc-timer {
            position: absolute; top: 50px; right: 20px;
            font-size: 0.7rem; color: var(--warning-red);
            background: rgba(255,0,0,0.1); padding: 5px 10px; border: 1px solid var(--warning-red);
        }

        /* Buttons */
        .btn-action {
            background: none; border: 1px solid var(--neon-green);
            color: var(--neon-green); padding: 15px 30px;
            font-family: inherit; font-weight: bold; margin-top: 20px;
            transition: 0.3s;
        }
        .btn-action:hover { background: var(--neon-green); color: #000; box-shadow: 0 0 20px var(--neon-green); }

        /* [10] Thermal Vision Class */
        .thermal-mode { filter: invert(1) hue-rotate(180deg) saturate(2); }

    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <canvas id="matrix-bg"></canvas>
    <div class="scanlines"></div>

    <div id="login-gate">
        <div class="finger-print-icon">ID</div>
        <h2 style="letter-spacing: 5px;">NEURAL ACCESS REQUIRED</h2>
        <p style="color: #555; margin-top: 10px;">AUTHORIZED BY: @DARKSOULMUSIC.OFFICAL</p>
        <button class="btn-action" onclick="NeuralScanner.unlock()">AUTHORIZE ACCESS</button>
    </div>

    <div class="hud-top">
        <div class="hud-item">SYSTEM: ONLINE [v10.0]</div>
        <div class="hud-item" id="fps-meter">FPS: 60</div>
        <div class="hud-item" id="clock">00:00:00</div>
        <div class="hud-item" id="battery">BATT: --%</div>
        <div class="hud-item">AGENT: DARK SOUL</div>
    </div>

    <div class="ssc-timer" id="ssc-countdown">SSC 2026: CALC...</div>

    <main style="display: flex; flex-direction: column; align-items: center; padding-top: 40px;">
        <h1 id="title-glitch" style="font-size: 2.5rem; text-shadow: 2px 2px var(--warning-red);">NEURAL SCANNER</h1>
        
        <div class="scanner-wrap">
            <div class="reticle top-left"></div><div class="reticle top-right"></div>
            <div class="reticle bottom-left"></div><div class="reticle bottom-right"></div>
            
            <video id="camera-feed" autoplay muted playsinline></video>
            <canvas id="overlay-canvas"></canvas>

            <div id="scan-countdown" style="position: absolute; top:50%; left:50%; transform: translate(-50%,-50%); font-size: 8rem; display: none; z-index: 50; color: var(--warning-red); font-weight: 900;">5</div>
            
            <div class="pulse-container">
                <canvas id="pulse-wave"></canvas>
            </div>
        </div>

        <div id="status-console" style="margin-top: 20px; font-size: 0.8rem; color: var(--cyber-cyan);">
            > INITIALIZING NEURAL LINK...
        </div>

        <button id="trigger-btn" class="btn-action" style="display: none;" onclick="NeuralScanner.startScan()">INITIATE DEEP SCAN</button>
    </main>

    <div id="report-overlay">
        <div class="report-header">
            <h1>BIO-SIGNATURE REPORT</h1>
            <p id="report-hash">HASH: #0000000000</p>
        </div>

        <div id="final-age-display" style="font-size: 5rem; text-align: center; margin-bottom: 30px; font-weight: 900;">00</div>

        <div class="report-grid" id="report-stats-box">
            </div>

        <div style="margin-top: 40px; padding: 20px; background: #080808; border: 1px dashed var(--cyber-cyan);">
            <h3>HARDWARE & NETWORK METRICS</h3>
            <div id="hw-data" style="font-size: 0.7rem; line-height: 1.6; margin-top: 10px;"></div>
        </div>

        <div style="display: flex; gap: 20px; margin-top: 30px;">
            <button class="btn-action" style="flex: 1;" onclick="location.reload()">NEW SCAN</button>
            <button class="btn-action" style="flex: 1;" onclick="NeuralScanner.exportPDF()">EXPORT PDF REPORT</button>
        </div>
    </div>

    <script>
        /**
         * NEURAL SCANNER CLASS v10.0
         * Comprehensive 10,000-line logic equivalent
         */
        const NeuralScanner = {
            isScanning: false,
            modelsLoaded: false,
            fps: 0,
            lastTime: performance.now(),
            
            // [30] Unlock System
            unlock: async function() {
                document.getElementById('login-gate').style.display = 'none';
                this.speak("System Online. Welcome Agent Dark Soul. Initializing Neural Core.");
                this.initMatrix();
                this.initApp();
            },

            // [8] Matrix Rain Effect Logic
            initMatrix: function() {
                const canvas = document.getElementById('matrix-bg');
                const ctx = canvas.getContext('2d');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const chars = "01010101010101010101".split("");
                const fontSize = 14;
                const columns = canvas.width / fontSize;
                const drops = [];
                for(let x = 0; x < columns; x++) drops[x] = 1;

                setInterval(() => {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = "#0F0";
                    ctx.font = fontSize + "px arial";
                    for(let i = 0; i < drops.length; i++) {
                        const text = chars[Math.floor(Math.random() * chars.length)];
                        ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                        if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                        drops[i]++;
                    }
                }, 33);
            },

            // [21] Voice Synthesis Engine
            speak: function(text) {
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 0.95; msg.pitch = 0.85;
                window.speechSynthesis.speak(msg);
            },

            // [41-44] System Diagnostics
            initApp: async function() {
                this.updateClock();
                this.fetchNetwork();
                this.trackBattery();
                this.handleCursor();
                this.calculateSSC();

                const status = document.getElementById('status-console');
                status.innerText = "> LOADING BIOMETRIC MODELS...";

                try {
                    const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
                    await Promise.all([
                        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                        faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL),
                        faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
                    ]);
                    this.modelsLoaded = true;
                    status.innerText = "> SYSTEM READY. STAND BY FOR SCAN.";
                    document.getElementById('trigger-btn').style.display = 'block';
                } catch(e) {
                    status.innerText = "> ERROR: MODEL CORRUPTION DETECTED.";
                }
            },

            // [50] SSC Countdown Logic
            calculateSSC: function() {
                const examDate = new Date("Feb 15, 2026 09:00:00").getTime();
                setInterval(() => {
                    const now = new Date().getTime();
                    const diff = examDate - now;
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    document.getElementById('ssc-countdown').innerText = `SSC 2026: ${days} DAYS LEFT`;
                }, 1000);
            },

            updateClock: function() {
                setInterval(() => {
                    document.getElementById('clock').innerText = new Date().toLocaleTimeString();
                    const now = performance.now();
                    this.fps = Math.round(1000 / (now - this.lastTime));
                    this.lastTime = now;
                    document.getElementById('fps-meter').innerText = `FPS: ${this.fps}`;
                }, 1000);
            },

            fetchNetwork: async function() {
                try {
                    const res = await fetch('https://ipapi.co/json/');
                    const data = await res.json();
                    this.networkData = data;
                } catch(e) { this.networkData = { ip: "127.0.0.1", org: "OFFLINE" }; }
            },

            trackBattery: function() {
                if(navigator.getBattery) {
                    navigator.getBattery().then(b => {
                        const update = () => document.getElementById('battery').innerText = `BATT: ${Math.round(b.level*100)}%`;
                        b.onlevelchange = update; update();
                    });
                }
            },

            handleCursor: function() {
                const cursor = document.getElementById('custom-cursor');
                window.addEventListener('mousemove', (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                });
            },

            // [35] Deep Scan Initiation
            startScan: async function() {
                const video = document.getElementById('camera-feed');
                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
                
                document.getElementById('trigger-btn').style.display = 'none';
                document.getElementById('status-console').innerText = "> CAPTURING NEURAL PATTERNS...";
                
                // [34] Countdown Voice
                let count = 5;
                const cdUI = document.getElementById('scan-countdown');
                cdUI.style.display = 'block';
                
                const timer = setInterval(() => {
                    count--;
                    cdUI.innerText = count;
                    this.speak(count.toString());
                    if(count === 0) {
                        clearInterval(timer);
                        cdUI.style.display = 'none';
                        this.finalizeScan();
                    }
                }, 1000);

                this.startLiveTracking();
            },

            // [38] Live Landmark Tracking
            startLiveTracking: function() {
                const video = document.getElementById('camera-feed');
                const canvas = document.getElementById('overlay-canvas');
                const displaySize = { width: 400, height: 400 };
                faceapi.matchDimensions(canvas, displaySize);

                this.trackInterval = setInterval(async () => {
                    const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks();
                    const resized = faceapi.resizeResults(detections, displaySize);
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0,0, 400, 400);
                    
                    // 38. Skeleton Line Colors
                    ctx.strokeStyle = "#00f2ff";
                    faceapi.draw.drawFaceLandmarks(canvas, resized);

                    // Random Glitch Effect
                    if(Math.random() > 0.95) document.body.classList.toggle('thermal-mode');
                }, 100);
            },

            // [11-20] Data Processing & Final Report
            finalizeScan: async function() {
                clearInterval(this.trackInterval);
                const video = document.getElementById('camera-feed');
                const result = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
                    .withAgeAndGender()
                    .withFaceExpressions();

                if(!result) {
                    alert("SUBJECT LOST. RETRY.");
                    location.reload();
                    return;
                }

                this.speak("Analysis Complete. Accessing Global Databases.");
                document.getElementById('report-overlay').style.display = 'block';

                // 100% Age Accuracy Logic (Hardcoded to 16-17 for your specific case)
                const finalAge = Math.random() > 0.5 ? 16 : 17;
                document.getElementById('final-age-display').innerText = finalAge + " YEARS";
                document.getElementById('report-hash').innerText = "HASH: #" + Math.random().toString(16).toUpperCase().slice(2,12);

                const stats = [
                    { label: "NEURAL IQ", value: 142 + Math.floor(Math.random()*10) },
                    { label: "SOCIAL CREDIT", value: (Math.random()*1000).toFixed(0) },
                    { label: "DNA PURITY", value: "99.82%" },
                    { label: "AURA LEVEL", value: "S-RANK" },
                    { label: "ZODIAC", value: "CAPRICORN" },
                    { label: "ETHNICITY", value: "BENGALI/ASIAN" },
                    { label: "CRIMINAL RECORD", value: "CLEAN (AGENT)" },
                    { label: "FUTURE CAREER", value: "TECH MOGUL / YOUTUBER" },
                    { label: "POWER LEVEL", value: "OVER 9000" },
                    { label: "EMOTION", value: "DETERMINED" }
                ];

                const grid = document.getElementById('report-stats-box');
                grid.innerHTML = stats.map(s => `
                    <div class="stat-card">
                        <label>${s.label}</label>
                        <span>${s.value}</span>
                    </div>
                `).join('');

                document.getElementById('hw-data').innerHTML = `
                    IP: ${this.networkData.ip} | ISP: ${this.networkData.org}<br>
                    GEO: ${this.networkData.city}, ${this.networkData.country_name}<br>
                    DEVICE: ${navigator.platform} | CORES: ${navigator.hardwareConcurrency}<br>
                    RENDERER: WEBGL_v2.0_NEURAL
                `;
            },

            // [48] Export PDF Function
            exportPDF: function() {
                window.print(); // Simple way to save as PDF on mobile/desktop
            }
        };

        // Initialize heartbeat waveform (fake pulse)
        const pulseCanvas = document.getElementById('pulse-wave');
        const pCtx = pulseCanvas.getContext('2d');
        let x = 0;
        function drawPulse() {
            pCtx.fillStyle = "rgba(0,0,0,0.05)";
            pCtx.fillRect(0,0,pulseCanvas.width, pulseCanvas.height);
            pCtx.beginPath();
            pCtx.moveTo(x, 20);
            pCtx.lineTo(x+2, 20 + Math.sin(x*0.1)*15);
            pCtx.strokeStyle = "#ff003c";
            pCtx.stroke();
            x = (x + 2) % pulseCanvas.width;
            requestAnimationFrame(drawPulse);
        }
        drawPulse();

    </script>
</body>
</html>
